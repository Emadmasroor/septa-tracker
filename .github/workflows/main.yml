name: Morning Trains Lookup
on:
  schedule:
    - cron: "40 14 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    # steps must be indented under build
    steps: 
      # 1. You must check out the code first so the runner can see lookuptrains.py
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. (Optional but recommended) Explicitly set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Change to whatever version you need

      # 3. (Optional but likely needed) Install dependencies if you have them
      # - name: Install dependencies
      #   run: pip install -r requirements.txt

      # 4. Run your script
      - name: Call SEPTA API
        run: python lookuptrains.py
